<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Bootstrap E-Commerce</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    scroll-behavior:smooth;
}

.hero{
    background: linear-gradient(to right,#0d6efd,#6610f2);
    color:white;
    padding:80px 0;
}

.card:hover{
    transform:scale(1.05);
    transition:0.3s;
}

footer{
    background:#212529;
    color:white;
}
</style>

</head>
<body>

<!-- ================= NAVBAR ================= -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
<div class="container">
<a class="navbar-brand" href="#">ShopEasy</a>

<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="nav">
<ul class="navbar-nav ms-auto">
<li class="nav-item"><a class="nav-link" href="#home">Home</a></li>
<li class="nav-item"><a class="nav-link" href="#products">Products</a></li>
<li class="nav-item"><a class="nav-link" href="#cart">Cart</a></li>
<li class="nav-item"><a class="nav-link" href="#contact">Contact</a></li>
</ul>
</div>
</div>
</nav>

<!-- ================= HERO ================= -->
<section id="home" class="hero text-center mt-5">
<div class="container">
<h1 class="display-4">Welcome to ShopEasy</h1>
<p class="lead">Best Online Store Built Using Bootstrap</p>
<a href="#products" class="btn btn-light btn-lg">Shop Now</a>
</div>
</section>

<!-- ================= PRODUCTS ================= -->
<section id="products" class="container py-5">
<h2 class="text-center mb-4">Products</h2>

<div class="row g-4">

<!-- Product 1 -->
<div class="col-md-4">
<div class="card">
<img src="https://via.placeholder.com/300" class="card-img-top">
<div class="card-body text-center">
<h5>Smartphone</h5>
<p class="text-success">₹25,000</p>
<button class="btn btn-primary" onclick="addToCart('Smartphone',25000)">Add to Cart</button>
</div>
</div>
</div>

<!-- Product 2 -->
<div class="col-md-4">
<div class="card">
<img src="https://via.placeholder.com/300">
<div class="card-body text-center">
<h5>Laptop</h5>
<p class="text-success">₹60,000</p>
<button class="btn btn-primary" onclick="addToCart('Laptop',60000)">Add to Cart</button>
</div>
</div>
</div>

<!-- Product 3 -->
<div class="col-md-4">
<div class="card">
<img src="https://via.placeholder.com/300">
<div class="card-body text-center">
<h5>Headphones</h5>
<p class="text-success">₹2,000</p>
<button class="btn btn-primary" onclick="addToCart('Headphones',2000)">Add to Cart</button>
</div>
</div>
</div>

</div>
</section>

<!-- ================= CART ================= -->
<section id="cart" class="container py-5">
<h2 class="text-center mb-4">Shopping Cart</h2>

<table class="table table-bordered">
<thead class="table-dark">
<tr>
<th>Product</th>
<th>Price</th>
</tr>
</thead>
<tbody id="cartItems"></tbody>
</table>

<h4 class="text-end">Total: ₹ <span id="total">0</span></h4>
</section>

<!-- ================= CONTACT ================= -->
<section id="contact" class="container py-5">
<h2 class="text-center mb-4">Contact Us</h2>

<form class="col-md-6 mx-auto">
<div class="mb-3">
<label class="form-label">Name</label>
<input type="text" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Email</label>
<input type="email" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Message</label>
<textarea class="form-control" rows="4"></textarea>
</div>

<button class="btn btn-primary w-100">Send Message</button>
</form>
</section>

<!-- ================= FOOTER ================= -->
<footer class="text-center p-3">
<p>© 2026 ShopEasy | Developed by Gurman Singh</p>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- ================= CART SCRIPT ================= -->
<script>
let total = 0;

function addToCart(name, price){
    let table = document.getElementById("cartItems");

    let row = `
        <tr>
            <td>${name}</td>
            <td>₹${price}</td>
        </tr>
    `;

    table.innerHTML += row;

    total += price;
    document.getElementById("total").innerText = total;
}
</script>

</body>
</html>
